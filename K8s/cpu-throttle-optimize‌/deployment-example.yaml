# CFS Burst Sidecar 示例 Deployment
#
# 使用方式：
# 1. 将以下 sidecar 和 volume 挂载添加到你的 Deployment spec 中
# 2. 或者用 kubectl patch 添加
#
# 示例：kubectl patch deployment your-app -p "$(cat deployment-example.yaml)"

apiVersion: apps/v1
kind: Deployment
metadata:
  name: your-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: your-app
  template:
    metadata:
      labels:
        app: your-app
      annotations:
        # CFS Burst 配置
        cfs-burst/enable: "true"
        cfs-burst/threshold: "5"      # throttle > 5% 触发 burst
        cfs-burst/multiplier: "3"     # quota 放大 3 倍
        cfs-burst/duration: "10"      # burst 持续 10 秒
    spec:
      containers:
      - name: main
        image: your-app:latest
        resources:
          limits:
            cpu: "2"
        # 如果已经有 volumeMounts，添加下面的挂载
        # volumeMounts:
        # - name: pod-info
        #   mountPath: /etc/pod-info
        # - name: sys-fs
        #   mountPath: /host_sys/fs
        #   mountPropagation: HostToContainer

      # CFS Burst Sidecar
      - name: cfs-burst-sidecar
        image: busybox:1.34
        imagePullPolicy: IfNotPresent

        # 通过环境变量传递配置（可选，annotation 优先级更高）
        env:
        - name: THRESHOLD
          value: "5"
        - name: MULTIPLIER
          value: "3"
        - name: DURATION
          value: "10"
        - name: CGROUP_ROOT
          value: "/host_sys/fs/cgroup"

        # Pod 信息（通过 downward API）
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_UID
          valueFrom:
            fieldRef:
              fieldPath: metadata.uid
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace

        command:
        - /bin/sh
        - -c
        - |
          chmod 755 /burst.sh && /burst.sh

        volumeMounts:
        - name: burst-script
          mountPath: /burst.sh
          subPath: burst.sh
        - name: pod-info
          mountPath: /etc/pod-info
        - name: sys-fs
          mountPath: /host_sys/fs
          mountPropagation: HostToContainer

        securityContext:
          privileged: true

      volumes:
      - name: burst-script
        configMap:
          name: cfs-burst-sidecar-script
          defaultMode: 0755
      - name: pod-info
        downwardAPI:
          items:
          - path: "annotations"
            fieldRef:
              fieldPath: metadata.annotations
      - name: sys-fs
        hostPath:
          path: /sys/fs

      # 亲和我不需要修改，sidecar 自动跟随 Pod 调度
      tolerations:
      - operator: Exists